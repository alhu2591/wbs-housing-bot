name: Build Android APK

on:
  push:
    paths:
      - 'android/app/**'
    branches: [ main ]
  workflow_dispatch:   # يدوي من GitHub UI

jobs:
  build:
    name: Build APK (arm64-v8a)
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python + Java ─────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. System dependencies for Buildozer ─────────────────────────────────
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libltdl-dev \
            libffi-dev libssl-dev \
            python3-dev python3-pip \
            ccache libncurses5 \
            autoconf automake libtool \
            zlib1g-dev cmake ninja-build

      # ── 4. Buildozer + Cython ─────────────────────────────────────────────────
      - name: Install buildozer
        run: |
          pip install --upgrade pip wheel
          pip install buildozer==1.5.0 cython==0.29.36

      # ── 5. Cache NDK / SDK / pip (huge speedup on repeat builds) ─────────────
      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android/app/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('android/app/buildozer.spec') }}
          restore-keys: pip-${{ runner.os }}-

      # ── 6. Build ──────────────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android/app
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "=== Build finished ==="
          ls -la bin/ 2>/dev/null || echo "No bin/ directory"

      # ── 7. Upload APK as artifact ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-debug-apk
          path: android/app/bin/*.apk
          retention-days: 30

      # ── 8. Create GitHub Release on main branch ───────────────────────────────
      - name: Get APK name
        id: apk
        run: |
          APK=$(ls android/app/bin/*.apk 2>/dev/null | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.ref == 'refs/heads/main' && steps.apk.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ github.run_number }}
          name: "WBS Berlin APK — Build #${{ github.run_number }}"
          body: |
            ## 📱 WBS Berlin Android App

            تطبيق يجلب إعلانات الشقق المدعومة (WBS) من برلين مباشرة.

            ### المميزات
            - 10 مصادر: Gewobag, Degewo, Howoge, Gesobau, WBM, Vonovia...
            - فلتر WBS Level (100–220)
            - فلتر Jobcenter KdU
            - فلتر الإيجار والغرف والمناطق

            ### التثبيت
            1. حمّل `${{ steps.apk.outputs.name }}`
            2. فعّل "مصادر غير معروفة" في إعدادات Android
            3. افتح ملف APK للتثبيت

            Built from commit `${{ github.sha }}`
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Upload build log on failure ───────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/app/build.log
          retention-days: 7
