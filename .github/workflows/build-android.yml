name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK with Buildozer Docker
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android/app/buildozer.spec') }}-v3
          restore-keys: buildozer-${{ runner.os }}-

      - name: Build APK via Buildozer Docker
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: android/app
          buildozer_version: stable

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-APK
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 60

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "android-build-${{ github.run_number }}"
          name: "📱 WBS Berlin APK — Build #${{ github.run_number }}"
          body: |
            ## تحميل تطبيق WBS Berlin

            **التثبيت:**
            1. حمّل ملف APK أدناه
            2. على هاتفك: الإعدادات → الأمان → فعّل "مصادر غير معروفة"
            3. افتح ملف APK

            **المميزات:**
            - 10 مصادر إعلانات برلين
            - فلتر WBS Level (100-220)
            - فلتر Jobcenter KdU
            - فلتر الإيجار والغرف والمناطق
          files: ${{ steps.buildozer.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
