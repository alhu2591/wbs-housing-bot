name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/app/buildozer.spec') }}-v4
          restore-keys: buildozer-

      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: android/app
          buildozer_version: stable

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-APK
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 60

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "android-v${{ github.run_number }}"
          name: "WBS Berlin APK — v${{ github.run_number }}"
          body: |
            ## تحميل تطبيق WBS Berlin

            1. حمّل APK من الأسفل
            2. الإعدادات → الأمان → فعّل "مصادر غير معروفة"
            3. افتح الملف وثبّته

            Built from `${{ github.sha }}`
          files: ${{ steps.buildozer.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/app/.buildozer/logs/
          retention-days: 7
