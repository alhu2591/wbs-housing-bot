name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # Download Arabic font for proper Arabic rendering in Kivy
      - name: Download Arabic font
        run: |
          cd android/app
          python3 - << 'PY'
          import urllib.request, ssl, os
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          urls = [
            'https://fonts.gstatic.com/s/notonaskharabic/v33/RrQ5bpV-9Dd1b1OAGA6M9PkyDuVBePeKNaxcsss0Y7bwvc5krK0z9_Mnuw.ttf',
            'https://github.com/notofonts/arabic/releases/download/NotoNaskhArabic-v2.015/NotoNaskhArabic.ttf',
          ]
          for url in urls:
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=30, context=ctx) as r:
                      data = r.read()
                  if len(data) > 50000:
                      open('NotoNaskhArabic.ttf', 'wb').write(data)
                      print(f'Font OK: {len(data):,} bytes from {url}')
                      break
              except Exception as e:
                  print(f'URL failed: {e}')
          else:
              print('WARNING: No font downloaded — Arabic will use fallback font')
          PY
          ls -lh *.ttf 2>/dev/null || true

      # Write ALL license hashes (prevents interactive SDK license prompts)
      - name: Accept SDK licenses
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          cat > "$SDK/licenses/android-sdk-license" << 'HASH'
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          d56f5187479451eabf01fb78af6dfcb131a6481e
          8933bad161af4178b1185d1a37fbf41ea5269c55
          HASH
          cat > "$SDK/licenses/android-sdk-preview-license" << 'HASH'
          84831b9409646a918e30573bab4c9c91346d8abd
          504667f4c0de7af1a06de9f4b1727b84351f2910
          HASH
          echo "601085b94cd77f0b54ff86406957099ebe79c4d7" > "$SDK/licenses/android-googletv-license"
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK/licenses/google-gdk-license"
          echo "79120722343a6f314e0719f863036c702b0e6b2a" > "$SDK/licenses/android-sdk-arm-dbt-license"

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/app/buildozer.spec','android/app/recipes/kivy/__init__.py') }}-v19
          restore-keys: buildozer-

      - name: Build APK
        run: |
          # Re-write licenses into the mounted volume
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          cat > "$SDK/licenses/android-sdk-license" << 'HASH'
          24333f8a63b6825ea9c5514f83c2829b004d1fee
          d56f5187479451eabf01fb78af6dfcb131a6481e
          8933bad161af4178b1185d1a37fbf41ea5269c55
          HASH
          cat > "$SDK/licenses/android-sdk-preview-license" << 'HASH'
          84831b9409646a918e30573bab4c9c91346d8abd
          504667f4c0de7af1a06de9f4b1727b84351f2910
          HASH

          docker run --rm \
            -v "${{ github.workspace }}/android/app":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "❌ Build failed — no APK produced"
            echo "Last 100 lines of build output:"
            find android/app/.buildozer -name "*.log" 2>/dev/null | head -3 | xargs tail -100 2>/dev/null || true
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"
          echo "size=$(du -h $APK | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "✅ APK: $APK ($(du -h $APK | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-v5.4-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v5.4.${{ github.run_number }}"
          name: "📱 WBS Berlin v5.4 — Build #${{ github.run_number }}"
          body: |
            ## WBS Berlin v5.4 — Final Release

            ### ✅ جاهز للتثبيت على Samsung A53 5G + Android 16

            ### الإصلاحات النهائية:
            - `android:exported="true"` مضافة على Activity (سبب الشاشة السوداء)
            - Hook ينظّف الـ AndroidManifest بعد توليده
            - لا `FOREGROUND_SERVICE` (كانت تسبب ANR crash)
            - يستهدف API 34 لتوافق Android 14/15/16
            - خط عربي مدمج (NotoNaskhArabic)

            ### التثبيت:
            ```
            1. حمّل WBS-Berlin-v5.4.apk أدناه
            2. الإعدادات ← الأمان ← تثبيت تطبيقات غير معروفة ✅
            3. افتح الملف وثبّته
            4. الإعدادات ← تطبيقات ← WBS Berlin ← البطارية ← غير مقيد
            ```

            **SHA:** `${{ github.sha }}`
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/.buildozer/
          retention-days: 7
