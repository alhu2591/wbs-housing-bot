name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Arabic font (Noto Naskh Arabic)
        run: |
          # Download via pip fonttools approach — reliable
          cd android/app
          # Try multiple sources
          curl -fsSL "https://fonts.gstatic.com/s/notonaskharabic/v33/RrQ5bpV-9Dd1b1OAGA6M9PkyDuVBePeKNaxcsss0Y7bwvc5krK0z9_Mnuw.ttf" \
            -o NotoNaskhArabic.ttf 2>/dev/null || \
          wget -q "https://fonts.gstatic.com/s/notonaskharabic/v33/RrQ5bpV-9Dd1b1OAGA6M9PkyDuVBePeKNaxcsss0Y7bwvc5krK0z9_Mnuw.ttf" \
            -O NotoNaskhArabic.ttf 2>/dev/null || \
          python3 -c "
          import urllib.request, ssl
          ctx = ssl.create_default_context()
          ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
          urls = [
            'https://fonts.gstatic.com/s/notonaskharabic/v33/RrQ5bpV-9Dd1b1OAGA6M9PkyDuVBePeKNaxcsss0Y7bwvc5krK0z9_Mnuw.ttf',
            'https://github.com/notofonts/arabic/releases/download/NotoNaskhArabic-v2.015/NotoNaskhArabic.ttf',
          ]
          for url in urls:
            try:
              req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=20, context=ctx) as r:
                data = r.read()
                if len(data) > 10000:
                  open('NotoNaskhArabic.ttf','wb').write(data)
                  print(f'Downloaded: {len(data):,} bytes')
                  break
            except Exception as e:
              print(f'Failed {url}: {e}')
          "
          ls -lh *.ttf 2>/dev/null || echo "No font downloaded (will use default)"

      - name: Pre-accept SDK licenses
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' \
            "24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            "d56f5187479451eabf01fb78af6dfcb131a6481e" \
            "8933bad161af4178b1185d1a37fbf41ea5269c55" \
            > "$SDK/licenses/android-sdk-license"
          printf '%s\n' \
            "84831b9409646a918e30573bab4c9c91346d8abd" \
            "504667f4c0de7af1a06de9f4b1727b84351f2910" \
            > "$SDK/licenses/android-sdk-preview-license"
          printf '%s\n' "601085b94cd77f0b54ff86406957099ebe79c4d7" \
            > "$SDK/licenses/android-googletv-license"
          printf '%s\n' "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > "$SDK/licenses/google-gdk-license"

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/app/buildozer.spec') }}-v16
          restore-keys: buildozer-

      - name: Build APK (Docker)
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' \
            "24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            "d56f5187479451eabf01fb78af6dfcb131a6481e" \
            "8933bad161af4178b1185d1a37fbf41ea5269c55" \
            > "$SDK/licenses/android-sdk-license"
          printf '%s\n' \
            "84831b9409646a918e30573bab4c9c91346d8abd" \
            "504667f4c0de7af1a06de9f4b1727b84351f2910" \
            > "$SDK/licenses/android-sdk-preview-license"

          docker run --rm \
            -v "${{ github.workspace }}/android/app":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1

      - name: Find APK
        id: apk
        run: |
          F=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$F" ]; then
            echo "path=$F" >> "$GITHUB_OUTPUT"
            echo "name=$(basename $F)" >> "$GITHUB_OUTPUT"
            echo "✅ APK: $F — $(du -h $F | cut -f1)"
          else
            echo "❌ No APK"
            find android/app/.buildozer -name "*.log" 2>/dev/null \
              | head -2 | xargs tail -80 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-APK-v4.1
          path: ${{ steps.apk.outputs.path }}
          retention-days: 60

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "android-v${{ github.run_number }}"
          name: "📱 WBS Berlin APK v4.1 — Build #${{ github.run_number }}"
          body: |
            ## 📥 WBS Berlin v4.1

            **الإصلاحات في هذا الإصدار:**
            - ✅ إصلاح شاشة سوداء + خروج فوري
            - ✅ مسار تخزين صحيح (user_data_dir)
            - ✅ خط عربي مضمّن
            - ✅ شاشة خطأ بدلاً من crash صامت
            - ✅ الخدمة الخلفية تبدأ بتأخير 3 ثوانٍ

            **التثبيت:**
            1. حمّل APK أدناه
            2. الإعدادات → الأمان → مصادر غير معروفة ✅
            3. افتح APK
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/.buildozer/
          retention-days: 7
