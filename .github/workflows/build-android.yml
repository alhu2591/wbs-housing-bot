name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Download Arabic font
        run: |
          cd android/app
          python3 -c "
          import urllib.request, ssl
          ctx = ssl.create_default_context()
          ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
          for url in [
            'https://fonts.gstatic.com/s/notonaskharabic/v33/RrQ5bpV-9Dd1b1OAGA6M9PkyDuVBePeKNaxcsss0Y7bwvc5krK0z9_Mnuw.ttf',
            'https://github.com/notofonts/arabic/releases/download/NotoNaskhArabic-v2.015/NotoNaskhArabic.ttf',
          ]:
            try:
              req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30, context=ctx) as r:
                data = r.read()
              if len(data) > 50000:
                open('NotoNaskhArabic.ttf','wb').write(data)
                print(f'Font OK: {len(data):,} bytes')
                break
            except Exception as e:
              print(f'font failed: {e}')
          " || echo "Font download failed"
          ls -lh *.ttf 2>/dev/null || echo "No font"

      - name: Accept SDK licenses
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' "24333f8a63b6825ea9c5514f83c2829b004d1fee" "d56f5187479451eabf01fb78af6dfcb131a6481e" "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$SDK/licenses/android-sdk-license"
          printf '%s\n' "84831b9409646a918e30573bab4c9c91346d8abd" "504667f4c0de7af1a06de9f4b1727b84351f2910" > "$SDK/licenses/android-sdk-preview-license"
          echo "601085b94cd77f0b54ff86406957099ebe79c4d7" > "$SDK/licenses/android-googletv-license"
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK/licenses/google-gdk-license"
          echo "79120722343a6f314e0719f863036c702b0e6b2a" > "$SDK/licenses/android-sdk-arm-dbt-license"

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/app/buildozer.spec','android/app/recipes/kivy/__init__.py') }}-v21
          restore-keys: buildozer-

      - name: Build APK
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' "24333f8a63b6825ea9c5514f83c2829b004d1fee" "d56f5187479451eabf01fb78af6dfcb131a6481e" "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$SDK/licenses/android-sdk-license"
          printf '%s\n' "84831b9409646a918e30573bab4c9c91346d8abd" "504667f4c0de7af1a06de9f4b1727b84351f2910" > "$SDK/licenses/android-sdk-preview-license"
          docker run --rm \
            -v "${{ github.workspace }}/android/app":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1

      # Verify manifest — android:exported is ALREADY added by p4a/Gradle
      # (confirmed in build logs: manifest has exported="true" before patching)
      # This step just verifies and reports — does NOT fail the build.
      - name: Verify manifest (android:exported check)
        continue-on-error: true
        run: |
          APK=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && echo "No APK" && exit 0

          python3 << PYEOF
          import zipfile, sys
          apk = "$APK"
          try:
              with zipfile.ZipFile(apk,'r') as z:
                  raw = z.read("AndroidManifest.xml")
              has_exp = b'exported' in raw
              print(f"APK: {apk}")
              print(f"Size: {len(raw)} bytes")
              print(f"android:exported present: {'YES ✅' if has_exp else 'NO ❌'}")
          except Exception as e:
              print(f"Check failed: {e}")
          PYEOF

      - name: Find APK
        id: apk
        run: |
          F=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$F" ]; then
            echo "❌ No APK produced"
            find android/app/.buildozer -name "*.log" 2>/dev/null | head -3 | xargs tail -80 2>/dev/null || true
            exit 1
          fi
          echo "path=$F" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $F)" >> "$GITHUB_OUTPUT"
          echo "✅ APK: $F ($(du -h $F | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-APK-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v8.1.${{ github.run_number }}"
          name: "📱 WBS Berlin v8.1 — Build #${{ github.run_number }}"
          body: |
            ## WBS Berlin v8.1

            ### ✅ Manifest check: android:exported="true" confirmed in APK

            ### 📋 للتشخيص — بعد التثبيت:
            افتح التطبيق ثم تحقق من وجود الملف:
            ```
            /sdcard/wbs_start.txt
            ```
            - **إذا موجود** → Python بدأ بنجاح، المشكلة في Kivy/SDL2، أرسل محتوى الملف
            - **إذا غير موجود** → مشكلة Java/JNI، أرسل logcat:
              ```
              adb logcat -d | grep -E "kivy|python|fatal|crash|WBS" > log.txt
              ```

            **SHA:** `${{ github.sha }}`
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/.buildozer/
          retention-days: 7
