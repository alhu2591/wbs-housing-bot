name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: android/app/.buildozer
          key: buildozer-${{ hashFiles('android/app/buildozer.spec') }}-v8
          restore-keys: buildozer-

      # Official Kivy Docker image — SDK + NDK + licenses pre-installed
      - name: Build APK via Kivy Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/android/app":/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
            echo "apk_name=$(basename $APK)" >> "$GITHUB_OUTPUT"
            echo "Found: $APK"
          else
            echo "No APK found"
            ls -la android/app/bin/ 2>/dev/null || true
          fi

      - name: Upload APK artifact
        if: steps.find_apk.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-APK
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 60

      - name: Create GitHub Release
        if: steps.find_apk.outputs.apk_path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "android-v${{ github.run_number }}"
          name: "📱 WBS Berlin APK #${{ github.run_number }}"
          body: |
            ## 📥 تحميل تطبيق WBS Berlin

            ### التثبيت:
            1. حمّل ملف APK أدناه
            2. على هاتفك: **الإعدادات → الأمان → مصادر غير معروفة → تفعيل**
            3. افتح ملف APK وثبّته

            ### المميزات:
            - 9 مصادر إعلانات برلين (Gewobag, Degewo, Gesobau, WBM...)
            - فلتر WBS Level (100 / 140 / 160 / 180 / 200 / 220)
            - فلتر Jobcenter KdU تلقائي
            - فتح الإعلان مباشرة في المتصفح

            Built from commit `${{ github.sha }}`
          files: ${{ steps.find_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
