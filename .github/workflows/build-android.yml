name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # ── Arabic font ────────────────────────────────────────────────
      - name: Download Arabic font
        run: |
          cd android/app
          python3 - << 'PY'
          import urllib.request, ssl
          ctx = ssl.create_default_context()
          ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
          for url in [
            'https://fonts.gstatic.com/s/notonaskharabic/v33/RrQ5bpV-9Dd1b1OAGA6M9PkyDuVBePeKNaxcsss0Y7bwvc5krK0z9_Mnuw.ttf',
            'https://github.com/notofonts/arabic/releases/download/NotoNaskhArabic-v2.015/NotoNaskhArabic.ttf',
          ]:
            try:
              req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30, context=ctx) as r:
                data = r.read()
              if len(data) > 50000:
                open('NotoNaskhArabic.ttf','wb').write(data)
                print(f'Font OK: {len(data):,} bytes')
                break
            except Exception as e:
              print(f'font url failed: {e}')
          PY
          ls -lh *.ttf 2>/dev/null || echo "No font (will use default)"

      # ── SDK licenses ───────────────────────────────────────────────
      - name: Accept SDK licenses
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' \
            "24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            "d56f5187479451eabf01fb78af6dfcb131a6481e" \
            "8933bad161af4178b1185d1a37fbf41ea5269c55" \
            > "$SDK/licenses/android-sdk-license"
          printf '%s\n' \
            "84831b9409646a918e30573bab4c9c91346d8abd" \
            "504667f4c0de7af1a06de9f4b1727b84351f2910" \
            > "$SDK/licenses/android-sdk-preview-license"
          echo "601085b94cd77f0b54ff86406957099ebe79c4d7" > "$SDK/licenses/android-googletv-license"
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK/licenses/google-gdk-license"
          echo "79120722343a6f314e0719f863036c702b0e6b2a" > "$SDK/licenses/android-sdk-arm-dbt-license"

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/app/buildozer.spec','android/app/recipes/kivy/__init__.py') }}-v20
          restore-keys: buildozer-

      # ── Build APK ──────────────────────────────────────────────────
      - name: Build APK
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' "24333f8a63b6825ea9c5514f83c2829b004d1fee" "d56f5187479451eabf01fb78af6dfcb131a6481e" "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$SDK/licenses/android-sdk-license"
          printf '%s\n' "84831b9409646a918e30573bab4c9c91346d8abd" "504667f4c0de7af1a06de9f4b1727b84351f2910" > "$SDK/licenses/android-sdk-preview-license"
          docker run --rm \
            -v "${{ github.workspace }}/android/app":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1

      # ── CRITICAL: Patch APK manifest (android:exported fix) ────────
      # The root cause of "black screen then exit" on Android 12+:
      # p4a generates AndroidManifest.xml WITHOUT android:exported="true"
      # on the main Activity. Android 12+ requires this attribute.
      # We patch the FINAL APK binary here to guarantee the fix.
      - name: Patch APK — add android:exported to manifest
        run: |
          # Install tools
          sudo apt-get install -y -q xmlstarlet zipalign apksigner aapt 2>/dev/null || true
          pip install apkpatcher 2>/dev/null || true

          # Find the APK
          APK=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No APK to patch — build failed"
            exit 1
          fi
          echo "📦 Found APK: $APK"

          # Method: use python to patch the manifest inside the APK
          python3 - << 'PY'
          import zipfile, os, re, shutil, struct

          apk = os.environ.get('APK_PATH') or ""
          # Find APK
          import glob
          apks = glob.glob("android/app/bin/*.apk")
          if not apks:
              print("No APK found"); exit(1)
          apk = apks[0]
          print(f"Patching: {apk}")

          # Read the APK (it's a ZIP)
          backup = apk + ".bak"
          shutil.copy(apk, backup)

          with zipfile.ZipFile(apk, 'r') as z:
              manifest_data = z.read("AndroidManifest.xml")

          print(f"Manifest size: {len(manifest_data)} bytes")

          # The binary AndroidManifest.xml has android:exported as a string
          # In the binary XML, strings are stored in a string pool
          # We need to add "exported" to the string pool and add the attribute
          # Simple approach: check if "exported" string exists, if not we need apktool

          # Check if exported is already present
          if b'exported' in manifest_data:
              print("'exported' string found in manifest")
              # Check if it's set to true for the main activity
              # The binary format stores boolean values — hard to parse without full parser
              # Let's use a different approach: use aapt to read, apktool to modify
          else:
              print("WARNING: 'exported' not found in manifest — need apktool")

          # Use apktool approach
          import subprocess, tempfile

          tmpdir = tempfile.mkdtemp()
          apktool_jar = "/tmp/apktool.jar"

          # Download apktool if not present
          if not os.path.exists(apktool_jar):
              print("Downloading apktool...")
              import urllib.request
              urllib.request.urlretrieve(
                  "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar",
                  apktool_jar)
              print("apktool downloaded")

          # Decompile
          print("Decompiling APK...")
          r = subprocess.run(
              ["java", "-jar", apktool_jar, "d", apk, "-o", tmpdir, "-f", "--no-res"],
              capture_output=True, text=True)
          print(r.stdout[-500:] if r.stdout else "")
          if r.returncode != 0:
              print(f"apktool decompile failed: {r.stderr[-300:]}")
              # Fallback: try without --no-res
              r2 = subprocess.run(
                  ["java", "-jar", apktool_jar, "d", apk, "-o", tmpdir, "-f"],
                  capture_output=True, text=True)
              if r2.returncode != 0:
                  print("apktool completely failed — skipping patch"); exit(0)

          # Read and patch the manifest
          mf_path = os.path.join(tmpdir, "AndroidManifest.xml")
          if not os.path.exists(mf_path):
              print("Manifest not found after decompile"); exit(0)

          mf = open(mf_path).read()
          print(f"Manifest (first 800 chars):\n{mf[:800]}")

          changed = False

          # Add exported="true" to main activity if missing
          def fix_activity(m):
              tag = m.group(0)
              if 'android:exported' not in tag:
                  tag = tag.replace('<activity ', '<activity android:exported="true" ', 1)
                  return tag, True
              return tag, False

          # Find all activity tags and add exported
          new_mf = mf
          for pat in [
              r'<activity\b[^>]*/>\s*',
              r'<activity\b.*?</activity>',
          ]:
              for match in re.finditer(pat, new_mf, re.DOTALL):
                  tag = match.group(0)
                  if 'android:exported' not in tag:
                      fixed = tag.replace('<activity ', '<activity android:exported="true" ', 1)
                      new_mf = new_mf.replace(tag, fixed, 1)
                      changed = True
                      print("Fixed activity exported")

          # Add exported to services/receivers
          for tag_name in ['service', 'receiver', 'provider']:
              for pat in [rf'<{tag_name}\b[^>]*/>', rf'<{tag_name}\b.*?</{tag_name}>']:
                  for match in re.finditer(pat, new_mf, re.DOTALL):
                      tag = match.group(0)
                      if 'android:exported' not in tag:
                          fixed = re.sub(rf'(<{tag_name}\b\s)', r'\1android:exported="false" ', tag, count=1)
                          new_mf = new_mf.replace(tag, fixed, 1)
                          changed = True

          if changed:
              open(mf_path, 'w').write(new_mf)
              print("Manifest patched successfully")
              print(f"New manifest (first 600):\n{new_mf[:600]}")
          else:
              print("No changes needed (exported already present)")

          # Recompile
          patched_apk = apk.replace('.apk', '-patched.apk')
          print("Recompiling APK...")
          r = subprocess.run(
              ["java", "-jar", apktool_jar, "b", tmpdir, "-o", patched_apk, "--use-aapt2"],
              capture_output=True, text=True)
          print(r.stdout[-500:] if r.stdout else "")
          if r.returncode != 0:
              print(f"Recompile with aapt2 failed, trying without...")
              r = subprocess.run(
                  ["java", "-jar", apktool_jar, "b", tmpdir, "-o", patched_apk],
                  capture_output=True, text=True)
              if r.returncode != 0:
                  print(f"Recompile failed: {r.stderr[-300:]}"); print("Using original APK"); exit(0)

          # Sign with debug key
          print("Creating debug keystore...")
          ks = "/tmp/debug.ks"
          subprocess.run(["keytool", "-genkey", "-v", "-keystore", ks,
              "-alias", "debug", "-keyalg", "RSA", "-keysize", "2048",
              "-validity", "10000", "-storepass", "android", "-keypass", "android",
              "-dname", "CN=Android Debug,O=Android,C=US"],
              capture_output=True)

          print("Signing APK...")
          signed_apk = apk.replace('.apk', '-signed.apk')
          r = subprocess.run(["apksigner", "sign", "--ks", ks, "--ks-pass", "pass:android",
              "--key-pass", "pass:android", "--out", signed_apk, patched_apk],
              capture_output=True, text=True)
          if r.returncode != 0:
              # Try jarsigner as fallback
              r2 = subprocess.run(["jarsigner", "-verbose", "-sigalg", "SHA256withRSA",
                  "-digestalg", "SHA-256", "-keystore", ks,
                  "-storepass", "android", "-keypass", "android",
                  patched_apk, "debug"], capture_output=True, text=True)
              if r2.returncode == 0:
                  shutil.copy(patched_apk, signed_apk)
                  print("Signed with jarsigner")
              else:
                  print("Signing failed — using unsigned patched APK")
                  shutil.copy(patched_apk, signed_apk)
          else:
              print("Signed with apksigner")

          # Replace original
          shutil.copy(signed_apk, apk)
          print(f"✅ APK patched and replaced: {apk}")
          import subprocess as sp
          info = sp.run(["aapt", "dump", "badging", apk], capture_output=True, text=True)
          if "exported" in info.stdout or info.returncode == 0:
              print("APK info extracted OK")

          # Cleanup
          shutil.rmtree(tmpdir, ignore_errors=True)
          for f in [patched_apk, signed_apk, backup]:
              try: os.unlink(f)
              except: pass
          PY
          echo "✅ Manifest patch step complete"

      # ── Find APK ───────────────────────────────────────────────────
      - name: Find APK
        id: apk
        run: |
          F=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$F" ]; then
            echo "❌ No APK"
            find android/app/.buildozer -name "*.log" 2>/dev/null | head -3 | xargs tail -80 2>/dev/null || true
            exit 1
          fi
          echo "path=$F" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $F)" >> "$GITHUB_OUTPUT"
          echo "✅ APK: $F ($(du -h $F | cut -f1))"
          # Show manifest to verify exported was added
          python3 -c "
          import zipfile, sys
          try:
            with zipfile.ZipFile('$F','r') as z:
              d = z.read('AndroidManifest.xml')
              print('exported in manifest:', b'exported' in d)
              print('Manifest size:', len(d))
          except Exception as e:
            print('manifest check error:', e)
          "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-v8.1-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v8.1.${{ github.run_number }}"
          name: "📱 WBS Berlin v8.1 — Build #${{ github.run_number }}"
          body: |
            ## WBS Berlin v8.1 — Black Screen Fix

            ### 🔧 Root cause fixed:
            The APK manifest now has `android:exported="true"` **guaranteed** via post-build apktool patching.

            Previous approach (p4a_hook.py) patched BEFORE Gradle runs.  
            Gradle then REGENERATED the manifest, removing the patch.  
            This build patches the **final APK binary** after everything.

            ### 📥 Install:
            1. Download `wbsberlin-*.apk`
            2. الإعدادات ← الأمان ← مصادر غير معروفة ✅
            3. افتح الملف

            ### 📋 If it still crashes:
            After installing, open the app once, then check:
            - `/sdcard/wbs_start.txt` — exists = Python started OK
            - If missing = Java/JNI crash, send logcat:
              ```
              adb logcat -d | grep -i "wbs\|kivy\|python\|fatal\|crash"
              ```

            **SHA:** `${{ github.sha }}`
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/.buildozer/
          retention-days: 7
