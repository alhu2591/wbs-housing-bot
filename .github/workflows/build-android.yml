name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # ── Arabic font ────────────────────────────────────────────────
      - name: Download Arabic font
        run: |
          cd android/app
          python3 - << 'PY'
          import urllib.request, ssl
          ctx = ssl.create_default_context()
          ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
          for url in [
            'https://fonts.gstatic.com/s/notonaskharabic/v33/RrQ5bpV-9Dd1b1OAGA6M9PkyDuVBePeKNaxcsss0Y7bwvc5krK0z9_Mnuw.ttf',
            'https://github.com/notofonts/arabic/releases/download/NotoNaskhArabic-v2.015/NotoNaskhArabic.ttf',
          ]:
            try:
              req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=30, context=ctx) as r:
                data = r.read()
              if len(data) > 50000:
                open('NotoNaskhArabic.ttf','wb').write(data)
                print(f'Font OK: {len(data):,} bytes')
                break
            except Exception as e:
              print(f'font failed: {e}')
          PY
          ls -lh *.ttf 2>/dev/null || echo "No font"

      # ── SDK licenses ───────────────────────────────────────────────
      - name: Accept SDK licenses
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' "24333f8a63b6825ea9c5514f83c2829b004d1fee" "d56f5187479451eabf01fb78af6dfcb131a6481e" "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$SDK/licenses/android-sdk-license"
          printf '%s\n' "84831b9409646a918e30573bab4c9c91346d8abd" "504667f4c0de7af1a06de9f4b1727b84351f2910" > "$SDK/licenses/android-sdk-preview-license"
          echo "601085b94cd77f0b54ff86406957099ebe79c4d7" > "$SDK/licenses/android-googletv-license"
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK/licenses/google-gdk-license"
          echo "79120722343a6f314e0719f863036c702b0e6b2a" > "$SDK/licenses/android-sdk-arm-dbt-license"

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('android/app/buildozer.spec','android/app/recipes/kivy/__init__.py') }}-v21
          restore-keys: buildozer-

      # ── Build APK ──────────────────────────────────────────────────
      - name: Build APK
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf '%s\n' "24333f8a63b6825ea9c5514f83c2829b004d1fee" "d56f5187479451eabf01fb78af6dfcb131a6481e" "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$SDK/licenses/android-sdk-license"
          printf '%s\n' "84831b9409646a918e30573bab4c9c91346d8abd" "504667f4c0de7af1a06de9f4b1727b84351f2910" > "$SDK/licenses/android-sdk-preview-license"
          docker run --rm \
            -v "${{ github.workspace }}/android/app":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1

      # ── CRITICAL: Patch android:exported in final APK ──────────────
      # Root cause: p4a generates manifest without android:exported="true"
      # Android 12+ (API 31+) crashes immediately without it.
      # We use apktool to decompile → patch XML → recompile → re-sign.
      - name: Patch APK manifest (android:exported fix)
        run: |
          set -e

          APK=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && echo "❌ No APK found" && exit 1
          echo "📦 APK: $APK ($(du -h $APK | cut -f1))"

          # Install tools
          sudo apt-get install -y -q apksigner >/dev/null 2>&1 || true

          # Download apktool
          APKTOOL=/tmp/apktool.jar
          if [ ! -f "$APKTOOL" ]; then
            echo "Downloading apktool..."
            curl -fsSL -o "$APKTOOL" \
              "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" \
              || wget -q -O "$APKTOOL" \
                "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar"
            echo "apktool downloaded: $(du -h $APKTOOL | cut -f1)"
          fi

          TMPDIR=$(mktemp -d)
          echo "Working dir: $TMPDIR"

          # Decompile — use binary output to avoid UnicodeDecodeError
          echo "Decompiling..."
          java -jar "$APKTOOL" d "$APK" -o "$TMPDIR" -f 2>&1 | tail -5 || {
            echo "apktool decompile failed, trying without resources..."
            java -jar "$APKTOOL" d "$APK" -o "$TMPDIR" -f --no-src 2>&1 | tail -5
          }

          MANIFEST="$TMPDIR/AndroidManifest.xml"
          [ ! -f "$MANIFEST" ] && echo "❌ Manifest not found after decompile" && exit 1

          echo "=== Manifest BEFORE patch (first 60 lines) ==="
          head -60 "$MANIFEST"

          # Patch with Python — add android:exported to ALL components
          python3 - "$MANIFEST" << 'PY'
          import sys, re

          path = sys.argv[1]
          with open(path, 'r', encoding='utf-8', errors='replace') as f:
              xml = f.read()

          original = xml
          changed = 0

          # Add exported="true" to Activity (main activity must be exported for launcher)
          def fix_component(xml, tag, value):
              nonlocal changed
              # Handle multi-line tags
              pattern = rf'(<{tag}\b(?:(?!android:exported)[^>])*?)(\s*/?>)'
              def replacer(m):
                  nonlocal changed
                  changed += 1
                  return m.group(1) + f'\n        android:exported="{value}"' + m.group(2)
              return re.sub(pattern, replacer, xml, flags=re.DOTALL)

          xml = fix_component(xml, 'activity', 'true')
          xml = fix_component(xml, 'service', 'false')
          xml = fix_component(xml, 'receiver', 'false')
          xml = fix_component(xml, 'provider', 'false')

          if changed:
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(xml)
              print(f"✅ Patched {changed} component(s)")
          else:
              print("ℹ️ All components already have android:exported")

          print("\n=== Manifest AFTER patch (first 60 lines) ===")
          print('\n'.join(xml.splitlines()[:60]))
          PY

          # Recompile
          echo "Recompiling..."
          PATCHED="$TMPDIR/patched.apk"
          java -jar "$APKTOOL" b "$TMPDIR" -o "$PATCHED" --use-aapt2 2>&1 | tail -10 || {
            echo "aapt2 failed, trying aapt1..."
            java -jar "$APKTOOL" b "$TMPDIR" -o "$PATCHED" 2>&1 | tail -10
          }

          [ ! -f "$PATCHED" ] && echo "❌ Recompile failed" && exit 1
          echo "Recompiled: $(du -h $PATCHED | cut -f1)"

          # Create debug keystore and sign
          echo "Signing..."
          KS=/tmp/debug.ks
          keytool -genkey -v -keystore "$KS" -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt 2>/dev/null || true

          SIGNED="$TMPDIR/signed.apk"

          # Try apksigner first (preferred)
          if command -v apksigner &>/dev/null; then
            apksigner sign --ks "$KS" --ks-pass pass:android \
              --key-pass pass:android --out "$SIGNED" "$PATCHED" 2>&1 \
              && echo "✅ Signed with apksigner" \
              || {
                echo "apksigner failed, trying jarsigner..."
                cp "$PATCHED" "$SIGNED"
                jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
                  -keystore "$KS" -storepass android -keypass android \
                  "$SIGNED" debug 2>&1 | tail -3 \
                  && echo "✅ Signed with jarsigner" || echo "⚠️ Signing failed, using unsigned"
              }
          else
            cp "$PATCHED" "$SIGNED"
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore "$KS" -storepass android -keypass android \
              "$SIGNED" debug 2>&1 | tail -3
          fi

          # Replace original APK
          cp "$SIGNED" "$APK"
          echo "✅ APK patched: $APK ($(du -h $APK | cut -f1))"

          # Verify exported is present
          python3 - "$APK" << 'PY2'
          import zipfile, sys
          apk = sys.argv[1]
          with zipfile.ZipFile(apk,'r') as z:
              raw = z.read("AndroidManifest.xml")
          has_exp = b'exported' in raw
          print(f"android:exported in binary manifest: {'✅ YES' if has_exp else '❌ NO (need binary patch)'}")
          PY2

          rm -rf "$TMPDIR"
          echo "✅ Patch step complete"

      # ── Find APK ───────────────────────────────────────────────────
      - name: Find APK
        id: apk
        run: |
          F=$(find android/app/bin -name "*.apk" 2>/dev/null | head -1)
          [ -z "$F" ] && echo "❌ No APK" && exit 1
          echo "path=$F" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $F)" >> "$GITHUB_OUTPUT"
          echo "✅ Final APK: $F ($(du -h $F | cut -f1))"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WBSBerlin-v8.1-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v8.1.${{ github.run_number }}"
          name: "📱 WBS Berlin v8.1 — Build #${{ github.run_number }}"
          body: |
            ## WBS Berlin v8.1

            ### ✅ تم تطبيق إصلاح android:exported عبر apktool على APK النهائي

            ### 📋 للتشخيص بعد التثبيت:
            افتح التطبيق مرة ثم ابحث عن:
            - `/sdcard/wbs_start.txt` — إذا موجود = Python يعمل
            - إذا مفقود = مشكلة Java/JNI

            **SHA:** `${{ github.sha }}`
          files: ${{ steps.apk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: android/app/.buildozer/
          retention-days: 7
